[workspace]
resolver = "2"
members = ["core", "js", "cli"]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Julián Rojas <julianandres.rojasmelendez@ugent.be>"]
license = "MIT"
repository = "https://github.com/julianrojas87/vortex-rdf"
description = "Modern and high-performance columnar RDF serialization format"

[workspace.dependencies]
vortex-rdf-core = { path = "core" }
vortex = { version = "0.57.2", default-features = false }
vortex-array = { version = "0.57.2" }
vortex-error = "0.57.2"
vortex-dtype = "0.57.2"
vortex-ipc = "0.57.2"
vortex-io = "0.57.2"
vortex-session = "0.57.2"
vortex-fsst = "0.57.2"
vortex-mask = "0.57.2"
vortex-scalar = "0.57.2"
vortex-file = { version = "0.57.2", features = ["tokio"] }
vortex-scan = { version = "0.57.2", features = ["tokio"] }

tokio = { version = "1.40", features = ["sync", "macros", "rt"] }
futures = "0.3"

oxrdf = "0.2"
oxrdfio = "0.1"
itertools = "0.12"
thiserror = "1.0"
anyhow = "1.0"

clap = { version = "4.5", features = ["derive"] }
wasm-bindgen = "0.2"
js-sys = "0.3"
console_error_panic_hook = "0.1"
getrandom = "0.2"
mimalloc = "0.1.48"
