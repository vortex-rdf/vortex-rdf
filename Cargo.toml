[workspace]
resolver = "2"
members = ["core", "js", "cli"]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Julián Rojas"]
license = "MIT"
repository = "https://github.com/julianrojas87/vortex-rdf"
description = "Modern and high-performance columnar RDF serialization format"

[workspace.dependencies]
vortex-rdf-core = { path = "core" }
vortex = { version = "0.56.0", default-features = false }
vortex-array = { version = "0.56.0", default-features = false }
vortex-error = "0.56.0"
vortex-dtype = "0.56.0"
vortex-ipc = "0.56.0"
vortex-io = "0.56.0"
vortex-session = "0.56.0"
vortex-fsst = "0.56.0"
vortex-mask = "0.56.0"
vortex-scalar = "0.56.0"

oxrdf = "0.2"
oxrdfio = "0.1"
itertools = "0.12"
thiserror = "1.0"
anyhow = "1.0"
memmap2 = "0.9.9"
clap = { version = "4.5", features = ["derive"] }
wasm-bindgen = "0.2"
js-sys = "0.3"
console_error_panic_hook = "0.1"
getrandom = "0.2"
mimalloc = "0.1.48"
